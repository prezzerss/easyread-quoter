services:
  - type: web
    name: easyread-quoter
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080   # Render will override this automatically
      - key: TRELLO_KEY
        sync: false
      - key: TRELLO_TOKEN
        sync: false
      - key: TRELLO_LIST_ID
        sync: false
      - key: XERO_CLIENT_ID
        sync: false
